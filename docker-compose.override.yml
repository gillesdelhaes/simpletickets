# Development overrides — hot reload for the backend
# Run frontend locally with: cd frontend && npm run dev
services:
  api:
    volumes:
      - ./backend:/app
      - attachments:/data/attachments
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - PYTHONDONTWRITEBYTECODE=1
